<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Energy Flow Animation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #1570ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 18px 16px;
      overflow: auto;
    }

    .sidebar h1 {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .sidebar p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .background-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 11px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: #a9b4c4;
    }

    button.is-active {
      border-color: var(--accent);
      color: #0b4eb3;
      background: #eef6ff;
    }

    .tree {
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tree details {
      border-top: 1px solid #eef1f5;
      padding-top: 6px;
    }

    .tree summary {
      cursor: default;
      color: #344054;
      font-size: 13px;
      font-weight: 650;
      list-style-position: outside;
    }

    .tree ul {
      display: grid;
      gap: 2px;
      margin: 7px 0 10px;
      padding: 0;
      list-style: none;
    }

    .curve-toggle {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 2px 0 2px 16px;
      color: #344054;
      font-size: 13px;
    }

    .curve-toggle input {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: var(--accent);
    }

    .curve-toggle span {
      overflow-wrap: anywhere;
    }

    .stage {
      display: grid;
      min-width: 0;
      padding: 20px;
    }

    .svg-frame {
      display: grid;
      position: relative;
      min-height: calc(100vh - 40px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(17, 24, 39, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(17, 24, 39, 0.04) 1px, transparent 1px),
        #ffffff;
      background-size: 24px 24px;
      overflow: hidden;
    }

    .fullscreen-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      display: inline-grid;
      place-items: center;
      width: 38px;
      min-height: 38px;
      padding: 0;
      color: #17202a;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(8px);
    }

    .fullscreen-toggle svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .fullscreen-toggle .fullscreen-exit-icon,
    .fullscreen-toggle.is-fullscreen .fullscreen-enter-icon {
      display: none;
    }

    .fullscreen-toggle.is-fullscreen .fullscreen-exit-icon {
      display: inline;
    }

    .svg-frame:fullscreen {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      border: 0;
      border-radius: 0;
      background-color: #ffffff;
    }

    .svg-frame:fullscreen object {
      min-height: 100vh;
    }

    object {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 42px);
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        grid-row: 2;
        border-right: 0;
        border-top: 1px solid var(--line);
      }

      .stage {
        grid-row: 1;
        padding: 0;
      }

      .svg-frame {
        width: 100%;
        min-height: 70vh;
        border-right: 0;
        border-left: 0;
        border-radius: 0;
      }

      object {
        width: 100%;
        min-height: 70vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="background-controls" id="backgroundButtons" aria-label="Background"></div>
      <ul class="tree" id="tree" aria-label="Energy flow curve tree"></ul>
    </aside>
    <section class="stage" aria-label="Animated energy flow diagram">
      <div class="svg-frame">
        <button class="fullscreen-toggle" id="fullscreenToggle" type="button" aria-label="Enter fullscreen" title="Enter fullscreen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path class="fullscreen-enter-icon" d="M8 3H3v5M16 3h5v5M8 21H3v-5M21 16v5h-5"></path>
            <path class="fullscreen-exit-icon" d="M9 4v5H4M15 4v5h5M9 20v-5H4M20 15h-5v5"></path>
          </svg>
        </button>
        <object id="energySvg" type="image/svg+xml" data="domek energy flow.svg" aria-label="Energy flow SVG"></object>
      </div>
    </section>
  </main>
  <script src="energy-flow.js"></script>
</body>
</html>
